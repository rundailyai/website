
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="toolbarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f3f4f6"/>

  <!-- Spreadsheet Card -->
  <g transform="translate(100, 100)" filter="url(#cardShadow)">
    <!-- Card Background -->
    <rect width="1000" height="600" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>

    <!-- Toolbar -->
    <rect width="1000" height="60" rx="12" fill="url(#toolbarGradient)"/>
    <rect y="12" width="1000" height="48" fill="url(#toolbarGradient)"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">
      Daily Planner - March 30, 2026
    </text>

    <!-- Content Area -->
    <g transform="translate(24, 84)">
      <!-- Priorities Section -->
      <rect width="952" height="45" fill="rgba(37, 99, 235, 0.08)" rx="4"/>
      <text x="12" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">
        Top 3 Priorities
      </text>

      <text x="12" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2563eb">
        1. Complete product launch tasks
      </text>
      <text x="12" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2563eb">
        2. Review marketing materials
      </text>
      <text x="12" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2563eb">
        3. Plan content calendar
      </text>

      <!-- Time Block Section -->
      <rect y="145" width="952" height="45" fill="rgba(37, 99, 235, 0.08)" rx="4"/>
      <text x="12" y="173" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">
        Time Block Schedule
      </text>

      <!-- Table Header -->
      <rect y="200" width="952" height="35" fill="#f3f4f6"/>
      <line x1="0" y1="235" x2="952" y2="235" stroke="#d1d5db" stroke-width="2"/>

      <text x="12" y="222" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Time</text>
      <text x="140" y="222" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Task/Activity</text>
      <text x="550" y="222" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Status</text>
      <text x="680" y="222" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Notes</text>

      <!-- Table Rows -->
      <g transform="translate(0, 235)">
        <text x="12" y="28" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">8:00 AM</text>
        <text x="140" y="28" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Morning routine &amp; planning</text>
        <text x="550" y="28" font-family="Arial, sans-serif" font-size="13" fill="#2563eb">Done</text>
        <text x="680" y="28" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Set daily intentions</text>
        <line x1="0" y1="38" x2="952" y2="38" stroke="#e5e7eb" stroke-width="1"/>

        <text x="12" y="68" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">9:00 AM</text>
        <text x="140" y="68" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Deep work - Product development</text>
        <text x="550" y="68" font-family="Arial, sans-serif" font-size="13" fill="#7c3aed">In Progress</text>
        <text x="680" y="68" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Focus session</text>
        <line x1="0" y1="78" x2="952" y2="78" stroke="#e5e7eb" stroke-width="1"/>

        <text x="12" y="108" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">10:30 AM</text>
        <text x="140" y="108" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Team standup meeting</text>
        <text x="680" y="108" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">30 min sync</text>
        <line x1="0" y1="118" x2="952" y2="118" stroke="#e5e7eb" stroke-width="1"/>

        <text x="12" y="148" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">11:00 AM</text>
        <text x="140" y="148" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Content creation</text>
        <text x="680" y="148" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Social media posts</text>
        <line x1="0" y1="158" x2="952" y2="158" stroke="#e5e7eb" stroke-width="1"/>

        <text x="12" y="188" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">12:00 PM</text>
        <text x="140" y="188" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Lunch break</text>
        <text x="680" y="188" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Take a walk</text>
        <line x1="0" y1="198" x2="952" y2="198" stroke="#e5e7eb" stroke-width="1"/>

        <text x="12" y="228" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">1:00 PM</text>
        <text x="140" y="228" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Client calls &amp; emails</text>
        <text x="680" y="228" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Follow up on leads</text>
      </g>
    </g>
  </g>
</svg>
