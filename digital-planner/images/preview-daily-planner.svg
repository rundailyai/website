  <text x="580" y="527" font-family="Arial, sans-serif" font-size="12" fill="#d97706" text-anchor="middle">Support</text>
  <text x="770" y="527" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Low</text>
  <circle cx="980" cy="522" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- Row 9 -->
  <line x1="50" y1="580" x2="1150" y2="580" stroke="#f1f5f9" stroke-width="1"/>
  <text x="70" y="567" font-family="monospace" font-size="13" fill="#1e293b">16:00</text>
  <text x="200" y="567" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Admin: expenses, invoices, scheduling</text>
  <rect x="540" y="551" width="80" height="22" rx="4" fill="#e2e8f0"/>
  <text x="580" y="567" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Admin</text>
  <text x="770" y="567" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Low</text>
  <circle cx="980" cy="562" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- Row 10 -->
  <line x1="50" y1="620" x2="1150" y2="620" stroke="#f1f5f9" stroke-width="1"/>
  <text x="70" y="607" font-family="monospace" font-size="13" fill="#1e293b">17:00</text>
  <text x="200" y="607" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Wrap up day & plan tomorrow</text>
  <rect x="540" y="591" width="80" height="22" rx="4" fill="#fef3c7"/>
  <text x="580" y="607" font-family="Arial, sans-serif" font-size="12" fill="#d97706" text-anchor="middle">Planning</text>
  <text x="770" y="607" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Medium</text>
  <circle cx="980" cy="602" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- Summary stats -->
  <rect x="50" y="660" width="1100" height="90" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="700" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a">Today's Summary</text>
  <rect x="320" y="680" width="180" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="410" y="707" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#166534" text-anchor="middle">2 Completed</text>
  <rect x="530" y="680" width="180" height="40" rx="8" fill="#fef3c7" stroke="#fde047" stroke-width="2"/>
  <text x="620" y="707" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#854d0e" text-anchor="middle">1 In Progress</text>
  <rect x="740" y="680" width="180" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="830" y="707" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#475569" text-anchor="middle">7 Remaining</text>
</svg>