  <text x="580" y="407" font-family="Arial, sans-serif" font-size="12" fill="#0369a1" text-anchor="middle">Personal</text>
  <text x="770" y="407" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Low</text>
  <circle cx="980" cy="402" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- Row 6 -->
  <line x1="50" y1="460" x2="1150" y2="460" stroke="#f1f5f9" stroke-width="1"/>
  <text x="70" y="447" font-family="monospace" font-size="13" fill="#1e293b">13:00</text>
  <text x="200" y="447" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Team sync: Sprint planning</text>
  <rect x="540" y="431" width="80" height="22" rx="4" fill="#ddd6fe"/>
  <text x="580" y="447" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle">Meetings</text>
  <text x="770" y="447" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Medium</text>
  <circle cx="980" cy="442" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- Row 7 -->
  <line x1="50" y1="500" x2="1150" y2="500" stroke="#f1f5f9" stroke-width="1"/>
  <text x="70" y="487" font-family="monospace" font-size="13" fill="#1e293b">14:00</text>
  <text x="200" y="487" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Marketing content review & feedback</text>
