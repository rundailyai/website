  <line x1="50" y1="420" x2="1150" y2="420" stroke="#f1f5f9" stroke-width="1"/>
  <text x="70" y="407" font-family="monospace" font-size="13" fill="#1e293b">12:00</text>
  <text x="200" y="407" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Lunch break</text>
