  <text x="770" y="487" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Medium</text>
  <circle cx="980" cy="482" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>

  <!-- Row 8 -->
  <line x1="50" y1="540" x2="1150" y2="540" stroke="#f1f5f9" stroke-width="1"/>
  <text x="70" y="527" font-family="monospace" font-size="13" fill="#1e293b">15:00</text>
  <text x="200" y="527" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">Customer support tickets & email</text>
