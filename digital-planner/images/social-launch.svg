<svg width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="socialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#socialGradient)"/>

  <!-- Content card -->
  <rect x="90" y="200" width="900" height="680" rx="20" fill="#ffffff" opacity="0.98"/>

  <!-- Product mockup area -->
  <rect x="140" y="270" width="800" height="380" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Mini daily planner mockup -->
  <rect x="180" y="310" width="340" height="300" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="200" y="330" width="300" height="30" rx="4" fill="#3b82f6"/>
  <text x="350" y="352" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Daily Planner</text>
  <line x1="200" y1="380" x2="500" y2="380" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="405" font-family="monospace" font-size="13" fill="#475569">08:00 Morning routine</text>
  <text x="210" y="430" font-family="monospace" font-size="13" fill="#475569">09:00 Focus work</text>
  <text x="210" y="455" font-family="monospace" font-size="13" fill="#475569">12:00 Lunch break</text>
  <text x="210" y="480" font-family="monospace" font-size="13" fill="#475569">13:00 Team meeting</text>
  <text x="210" y="505" font-family="monospace" font-size="13" fill="#475569">15:00 Project review</text>
  <circle cx="480" cy="400" r="8" fill="#10b981"/>
  <circle cx="480" cy="425" r="8" fill="#f59e0b"/>

  <!-- Supporting elements -->
  <rect x="550" y="310" width="340" height="140" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="720" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Habit Tracker</text>
  <circle cx="610" cy="380" r="12" fill="#10b981"/>
  <circle cx="650" cy="380" r="12" fill="#10b981"/>
  <circle cx="690" cy="380" r="12" fill="#10b981"/>
  <circle cx="730" cy="380" r="12" fill="#10b981"/>
  <circle cx="770" cy="380" r="12" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
  <text x="720" y="425" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">21 day streak!</text>

  <rect x="550" y="470" width="340" height="140" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="720" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Goal Progress</text>
  <rect x="570" y="530" width="300" height="18" rx="9" fill="#e2e8f0"/>
  <rect x="570" y="530" width="180" height="18" rx="9" fill="#3b82f6"/>
  <text x="720" y="580" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">60% Complete</text>

  <!-- Headline -->
  <text x="540" y="720" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0f172a" text-anchor="middle">Digital Planner Bundle</text>

  <!-- Subheadline -->
  <text x="540" y="770" font-family="Arial, sans-serif" font-size="24" fill="#475569" text-anchor="middle">Plan Your Best Day, Every Day</text>

  <!-- Price badge -->
  <rect x="420" y="800" width="240" height="50" rx="25" fill="#10b981"/>
  <text x="540" y="835" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">$29</text>

  <!-- Brand -->
  <text x="540" y="150" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">RunDailyAI</text>

  <!-- CTA -->
  <text x="540" y="940" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Get Your Planners →</text>
